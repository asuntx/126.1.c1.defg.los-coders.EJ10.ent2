<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingresos-Personas Bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <script type="module">
      import cIngreso from "./dist/controllers/Cl_cIngreso.js";
      new cIngreso();
    </script>

    <div id="app-bootstrap" class="container py-4" style="max-width: 540px">
      <section id="persona" hidden>
        <div class="card mb-4 shadow-sm">
          <div class="card-header">
            <h5 id="persona_lblPersona" class="mb-0">Procesar Persona</h5>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label"
                >Nombre:
                <input
                  type="text"
                  id="persona_inNombre"
                  placeholder="Ej: Ana"
                  class="form-control"
                />
              </label>
            </div>
            <div class="mb-3">
              <label class="form-label"
                >Tipo de trabajo:
                <input
                  type="text"
                  id="persona_inTipo"
                  placeholder="Ej: 0 (Remoto) 1 (Presencial)"
                  class="form-control"
                />
              </label>
            </div>
            <div class="mb-3">
              <label class="form-label"
                >Ingreso:
                <input
                  type="number"
                  id="persona_inIngreso"
                  placeholder="Ej: 100"
                  class="form-control"
                />
              </label>
            </div>
            <div class="d-flex gap-2">
              <button id="persona_btCancelar" class="btn btn-outline-secondary">
                Cancelar
              </button>
              <button id="persona_btAceptar" class="btn btn-primary">
                Aceptar
              </button>
            </div>
          </div>
        </div>
      </section>

      <hr />

      <div class="mb-3">
        <button id="body_btNuevoIngreso" class="btn btn-success">
          Nueva Persona
        </button>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <table class="table table-borderless mb-0">
            <tbody>
              <tr>
                <td class="text-muted">Ingreso promedio:</td>
                <td><span id="body_lblPromedio" class="fw-bold">0</span>$</td>
              </tr>
              <tr>
                <td class="text-muted">Monto del ingreso menor:</td>
                <td><span id="body_lblMenor" class="fw-bold">0</span>$</td>
              </tr>
              <tr>
                <td class="text-muted">
                  Nombre de la persona con mayor ingreso:
                </td>
                <td><span id="body_lblMayor" class="fw-bold">0</span></td>
              </tr>
              <tr>
                <td class="text-muted">
                  Porcentaje de personas con ingresos mayores a 500$:
                </td>
                <td>
                  <span
                    id="body_lblPorcentajeIngAltos"
                    class="badge bg-info text-dark"
                    >0</span
                  >%
                </td>
              </tr>
              <tr>
                <td class="text-muted">Tipo de trabajo predominante:</td>
                <td>
                  <span id="body_lblTipoPredominante"></span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
